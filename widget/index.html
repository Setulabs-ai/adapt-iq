<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Shopify Store</title>
    <!-- We simulate that the user is currently viewing Product 1 -->
    <meta property="adaptiq:product_id" content="p_1" />
    
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        color: #333;
        background: #fff;
      }
      .header {
        padding: 20px 40px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-weight: bold;
        font-size: 24px;
      }
      .nav {
        display: flex;
        gap: 20px;
      }
      .nav a {
        text-decoration: none;
        color: #666;
      }
      .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .product-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        margin-bottom: 60px;
      }
      .product-image {
        width: 100%;
        background: #f5f5f5;
        aspect-ratio: 1;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #aaa;
      }
      .product-info h1 {
        margin: 0 0 10px 0;
      }
      .price {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .desc {
        color: #666;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .btn-add {
        background: #000;
        color: #fff;
        border: none;
        padding: 16px 32px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.2s;
      }
      .btn-add:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="logo">My Demo Store</div>
      <nav class="nav">
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Cart (0)</a>
      </nav>
    </header>

    <div class="container">
      <div class="product-layout product-details">
        <div class="product-image">
          Classic Cotton Tee Image
        </div>
        <div class="product-info">
          <h1>Classic Cotton Tee</h1>
          <div class="price">$29.00</div>
          <p class="desc">A versatile, comfortable cotton t-shirt that goes with practically everything in your wardrobe. Ethically sourced and exceptionally soft.</p>
          <button class="btn-add">Add to Cart</button>
        </div>
      </div>

      <!-- AdaptIQ will inject its widget here or below the product-details div automatically -->
      <div id="adaptiq-recommendations"></div>

    </div>

    <!-- The actual script tag that a merchant would install -->
    <script type="module" src="/src/main.js" data-store-id="store_123"></script>
  </body>
</html>
